#@Async vs CompletableFuture.supplyAsync
#
#You can write async code in two common ways.
#
#Option A: Spring style with @Async
#@Async("apiExecutor")
#public CompletableFuture<String> loadData() {
#    return CompletableFuture.completedFuture("data");
#}
#
#Use this when the method is inside a Spring bean and called from another Spring bean.
#
#Option B: Pure Java style with supplyAsync
#CompletableFuture<String> future =
#        CompletableFuture.supplyAsync(() -> "data", executor);
#
#Use this when you want to manually submit a lambda/task to an executor.
#
#Important: if you call CompletableFuture.supplyAsync(...) without passing an executor, Java uses the common ForkJoinPool by default for async methods. For Spring Boot applications, I usually prefer passing my own executor so API tasks, CPU tasks, and framework tasks do not accidentally compete in the same pool.
#
#10. Very important mistakes to avoid
#Mistake 1: Calling @Async method inside the same class
#
#Bad:
#
#@Service
#public class MyService {
#
#    public void mainMethod() {
#        asyncMethod(); // This will usually NOT run async.
#    }
#
#    @Async
#    public void asyncMethod() {
#    }
#}
#
#Good:
#
#@Service
#public class ServiceA {
#
#    private final ServiceB serviceB;
#
#    public ServiceA(ServiceB serviceB) {
#        this.serviceB = serviceB;
#    }
#
#    public void mainMethod() {
#        serviceB.asyncMethod(); // This goes through Spring proxy.
#    }
#}
#
#@Service
#public class ServiceB {
#
#    @Async
#    public void asyncMethod() {
#    }
#}
#
#Spring’s default async mode is proxy-based, and local method calls inside the same class are not intercepted.
#
#Mistake 2: Blocking immediately with get() or join()
#
#Bad:
#
#CompletableFuture<Product> future = productClient.getProduct(id);
#Product product = future.get(); // Blocks current thread immediately.
#
#This starts async work, but then immediately waits. You lose most of the benefit.
#
#Better:
#
#return productClient.getProduct(id)
#        .thenApply(product -> ResponseEntity.ok(product));
#Mistake 3: Using same executor for everything
#
#Better separation:
#
#apiExecutor -> REST calls, DB calls, file calls, email, external APIs
#cpuExecutor -> CPU-heavy calculations
#
#Why? Because CPU-heavy work can occupy all threads and slow down normal API work.
#
#Mistake 4: Creating unlimited threads
#
#Bad:
#
#Executors.newCachedThreadPool();
#
#This can create too many threads under heavy traffic.
#
#Better:
#
#executor.setCorePoolSize(4);
#executor.setMaxPoolSize(8);
#executor.setQueueCapacity(100);
#
#Start small, monitor, then tune.
#
#11. Optional: Virtual threads in Spring Boot
#
#With Java 21+, Spring Boot can use virtual threads by setting:
#
#spring.threads.virtual.enabled=true
#
#Spring Boot docs say that when virtual threads are enabled with Java 21+ and this property is true, Boot’s autoconfigured async executor uses virtual threads; otherwise it uses ThreadPoolTaskExecutor defaults.
#
#Virtual threads are very useful for many blocking I/O tasks, like:
#
#DB calls
#REST calls
#file calls
#network calls
#
#But for CPU-heavy work, virtual threads do not magically create more CPU cores. For CPU-heavy parallelism, still limit parallel work near CPU core count